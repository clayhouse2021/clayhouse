<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>個人主頁產生器 - 圖示自訂顏色版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #FDFBF7;
            color: #524641;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左側控制面板 */
        .control-panel {
            width: 420px;
            background: white;
            border-right: 1px solid #EFEAE4;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            z-index: 10;
        }

        h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
            color: #524641;
        }

        .subtitle {
            margin: 0 0 10px 0;
            font-size: 13px;
            color: #756761;
            line-height: 1.5;
        }

        /* 顏色選擇器區塊 - 調整為流式網格以容納 7 個調色盤 */
        .color-pickers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: #FDFBF7;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #EFEAE4;
        }

        .color-pickers > div {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .color-pickers > div.full-width {
            grid-column: span 2;
        }

        .color-pickers label {
            font-size: 11px;
            font-weight: bold;
            color: #756761;
        }

        .color-picker-input {
            width: 100%;
            height: 38px;
            border: 1px solid #EFEAE4;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            padding: 2px;
            box-sizing: border-box;
        }

        /* 表單元件 */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: bold;
            color: #524641;
        }

        .upload-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .file-upload-btn {
            flex: 1;
            display: block;
            text-align: center;
            background: #F4F0EA;
            color: #756761;
            border: 1px dashed #C8BFB9;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-upload-btn:hover {
            background: #EFEAE4;
            border-color: #756761;
        }

        .btn-clear-img {
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 11px 12px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="file"] {
            display: none;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #EFEAE4;
            border-radius: 10px;
            background-color: #FDFBF7;
            font-size: 14px;
            color: #524641;
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #E2B27A;
        }

        textarea {
            height: 70px;
            resize: vertical;
        }

        /* 按鈕自訂列表 */
        .link-input-group {
            background: #FDFBF7;
            border: 1px solid #EFEAE4;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .link-input-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin: 10px 0 5px 0;
            color: #756761;
        }

        .btn-delete {
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add-link {
            background: #756761;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn-download {
            background: #E2B27A;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
        }

        /* 👉 右側實時滿版預覽面板 */
        .preview-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .preview-card {
            max-width: 400px;
            width: 100%;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 45px rgba(82, 70, 65, 0.08);
            box-sizing: border-box;
            overflow: hidden;
            padding-bottom: 35px;
            background-color: #FFFFFF;
        }

        .preview-banner {
            width: 100%;
            height: 150px;
            background-size: cover;
            background-position: center;
            background-color: #EFEAE4;
        }

        .preview-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid white;
            margin: -45px auto 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            background-size: cover;
            background-position: center;
            background-color: #DCD5CE;
        }

        .preview-name {
            font-size: 22px;
            font-weight: bold;
            color: #524641;
            margin: 10px 20px;
        }

        .preview-bio {
            font-size: 14px;
            color: #756761;
            margin: 5px 25px 25px;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .preview-links-area {
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .preview-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 12px 20px;
            background-color: #FFFFFF;
            color: #524641;
            text-decoration: none;
            border-radius: 16px;
            font-weight: bold;
            border: 1px solid #EFEAE4;
            box-shadow: 0 4px 10px rgba(82, 70, 65, 0.02);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .preview-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(82, 70, 66, 0.06);
        }

        .preview-link-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .preview-icon-circle {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background-color: #eca674;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .preview-arrow {
            font-size: 13px;
            color: #888888;
            transition: all 0.2s ease;
        }

        .preview-link:hover .preview-arrow {
            transform: translate(2px, -2px);
            color: inherit;
        }

        /* 橫排 Social Icon 區塊 */
        .social-icons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin: -10px auto 20px;
            flex-wrap: wrap;
        }

        .preview-social-icon-link {
            text-decoration: none;
            font-size: 22px;
            transition: transform 0.2s ease, color 0.2s ease;
            display: inline-block;
        }

        .preview-social-icon-link:hover {
            transform: scale(1.2);
        }

        .preview-image-link {
            display: block;
            width: 100%;
            height: 180px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            text-decoration: none;
            background-color: #EFEAE4;
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 10px rgba(82, 70, 65, 0.02);
            border: 1px solid #EFEAE4;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .preview-image-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(82, 70, 66, 0.06);
        }

        .preview-image-link-text {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 15px 12px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            color: #FFFFFF;
            font-weight: bold;
            font-size: 15px;
            text-align: left;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .preview-image-link.no-img {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F4F0EA;
            border: 1px dashed #C8BFB9;
        }

        .preview-image-link.no-img::before {
            content: "🖼️ 尚未設定圖片";
            color: #756761;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h2>🎨 簡易個人主頁產生器</h2>
                <p class="subtitle">生產你的個人網站</p>
            </div>
            <span id="save-status" style="font-size: 11px; color: #5C8374; font-weight: bold; background: #E8F5E9; padding: 4px 8px; border-radius: 20px;">✓ 已自動存檔</span>
        </div>

        <div class="color-pickers">
            <div>
                <label>🎨 網頁大背景</label>
                <input type="color" id="input-bg-color" class="color-picker-input" value="#F7F4F0">
            </div>
            <div>
                <label>⬜ 中間卡片顏色</label>
                <input type="color" id="input-card-color" class="color-picker-input" value="#FFFFFF">
            </div>
            <div>
                <label>⭐ 強調按鈕顏色</label>
                <input type="color" id="input-main-color" class="color-picker-input" value="#E2B27A">
            </div>
            <div>
                <label>🔗 一般按鈕顏色</label>
                <input type="color" id="input-normal-btn-color" class="color-picker-input" value="#FFFFFF">
            </div>
            <div>
                <label>📱 社群圖示顏色</label>
                <input type="color" id="input-social-color" class="color-picker-input" value="#E2B27A">
            </div>
            <div>
                <label>🔘 按鈕內 Icon 顏色</label>
                <input type="color" id="input-icon-color" class="color-picker-input" value="#E2B27A">
            </div>
            <div class="full-width">
                <label>🖼️ Banner 預設背景色 (未上傳圖片時顯示)</label>
                <input type="color" id="input-banner-color" class="color-picker-input" value="#F3E8D2">
            </div>
        </div>

        <div class="form-group">
            <label>🖼️ Banner 看板圖片</label>
            <div class="upload-row">
                <label for="upload-banner" class="file-upload-btn" id="label-banner">📁 點擊選取本機圖片...</label>
                <button class="btn-clear-img" onclick="clearImage('banner')">重設單色</button>
            </div>
            <input type="file" id="upload-banner" accept="image/*">
        </div>

        <div class="form-group">
            <label>🐱 大頭貼圖片</label>
            <div class="upload-row">
                <label for="upload-avatar" class="file-upload-btn" id="label-avatar">📁 點擊選取本機圖片...</label>
                <button class="btn-clear-img" onclick="clearImage('avatar')">重設單色</button>
            </div>
            <input type="file" id="upload-avatar" accept="image/*">
        </div>

        <div class="form-group">
            <label>你的名字</label>
            <input type="text" id="input-name" placeholder="請輸入你的 brand 名稱" value="我的品牌">
        </div>

        <div class="form-group">
            <label>個人簡介</label>
            <textarea id="input-bio" placeholder="介紹你自己">介紹你自己</textarea>
        </div>

        <div style="margin-top: 10px; background: #FDFBF7; padding: 15px; border-radius: 12px; border: 1px solid #EFEAE4;">
            <label style="font-size: 13px; font-weight: bold; color: #524641; display: block; margin-bottom: 10px;">📱 社群圖示連結設定 (留空不顯示)</label>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 14px; width: 30px; text-align: center;"><i class="fa-brands fa-instagram" id="icon-ig-preview"></i></span>
                    <input type="text" id="input-social-ig" placeholder="Instagram 網址" style="padding: 8px 12px; font-size: 12px;">
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 14px; width: 30px; text-align: center;"><i class="fa-brands fa-square-facebook" id="icon-fb-preview"></i></span>
                    <input type="text" id="input-social-fb" placeholder="Facebook 網址" style="padding: 8px 12px; font-size: 12px;">
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 14px; width: 30px; text-align: center;"><i class="fa-brands fa-line" id="icon-line-preview"></i></span>
                    <input type="text" id="input-social-line" placeholder="LINE 連結" style="padding: 8px 12px; font-size: 12px;">
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 14px; width: 30px; text-align: center;"><i class="fa-solid fa-envelope" id="icon-mail-preview"></i></span>
                    <input type="text" id="input-social-email" placeholder="Email 信箱 (如 mailto:xxx@gmail.com)" style="padding: 8px 12px; font-size: 12px;">
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 14px; width: 30px; text-align: center;"><i class="fa-brands fa-youtube" id="icon-yt-preview"></i></span>
                    <input type="text" id="input-social-yt" placeholder="YouTube 頻道網址" style="padding: 8px 12px; font-size: 12px;">
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 14px; width: 30px; text-align: center;"><i class="fa-brands fa-threads" id="icon-threads-preview"></i></span>
                    <input type="text" id="input-social-threads" placeholder="Threads 網址" style="padding: 8px 12px; font-size: 12px;">
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 14px; width: 30px; text-align: center;"><i class="fa-brands fa-github" id="icon-git-preview"></i></span>
                    <input type="text" id="input-social-github" placeholder="GitHub 網址" style="padding: 8px 12px; font-size: 12px;">
                </div>
            </div>
        </div>

        <div style="margin-top: 10px;">
            <label style="font-size: 13px; font-weight: bold; color: #524641;">🔗 按鈕連結設定</label>
            <div id="links-container" style="margin-top: 10px;"></div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-add-link" onclick="addLinkField('button')" style="flex: 1; margin-top: 0; padding: 12px 8px; font-size: 13px;">＋ 新增文字按鈕</button>
                <button class="btn-add-link" onclick="addLinkField('image')" style="flex: 1; margin-top: 0; padding: 12px 8px; font-size: 13px; background-color: #5C8374;">＋ 新增圖片連結</button>
            </div>
        </div>

        <button onclick="resetAllData()" style="background: none; border: none; color: #FF6B6B; font-size: 12px; text-decoration: underline; cursor: pointer; margin-top: 15px; align-self: flex-start; padding: 0;">🗑️ 清空所有暫存並重設</button>

        <button class="btn-download" onclick="downloadHTML()">📥 匯出包裝資料夾 (ZIP)</button>
    </div>

    <div class="preview-panel" id="view-panel-bg">
        <div class="preview-card" id="view-card-bg">
            <div id="view-banner" class="preview-banner" style="background-size: cover; background-position: center;"></div>
            <div id="view-avatar" class="preview-avatar" style="background-size: cover; background-position: center;"></div>
            <div id="view-name" class="preview-name"></div>
            <div id="view-bio" class="preview-bio"></div>
            <div id="view-social-container" class="social-icons-wrapper"></div>
            <div id="preview-links-container" class="preview-links-area"></div>
        </div>
    </div>

    <textarea id="code-template" style="display: none;">

    <div class="card">
        <div class="banner" {{BANNER_STYLE}}></div>
        <div class="avatar" {{AVATAR_STYLE}}></div>
        <h1>{{NAME}}</h1>
        <div class="bio">{{BIO}}</div>
{{SOCIAL_HTML}}
        <div class="links-wrapper">
{{LINKS_HTML}}
        </div>
    </div>
</body>
</html>
    </textarea>

    <script>
        const inBgColor = document.getElementById('input-bg-color');
        const inCardColor = document.getElementById('input-card-color');
        const inMainColor = document.getElementById('input-main-color');
        const inNormalBtnColor = document.getElementById('input-normal-btn-color');
        const inBannerColor = document.getElementById('input-banner-color');
        const inSocialColor = document.getElementById('input-social-color'); // ✨ 獲取社群圖示顏色 input
        const inIconColor = document.getElementById('input-icon-color');     // ✨ 獲取按鈕圖示顏色 input
        const inName = document.getElementById('input-name');
        const inBio = document.getElementById('input-bio');

        const inSocialIg = document.getElementById('input-social-ig');
        const inSocialFb = document.getElementById('input-social-fb');
        const inSocialLine = document.getElementById('input-social-line');
        const inSocialEmail = document.getElementById('input-social-email');
        const inSocialYt = document.getElementById('input-social-yt');
        const inSocialThreads = document.getElementById('input-social-threads');
        const inSocialGithub = document.getElementById('input-social-github');

        const uploadBanner = document.getElementById('upload-banner');
        const uploadAvatar = document.getElementById('upload-avatar');
        const labelBanner = document.getElementById('label-banner');
        const labelAvatar = document.getElementById('label-avatar');

        let base64Banner = null;
        let base64Avatar = null;
        let bannerFileName = '';
        let avatarFileName = '';

        const vPanelBg = document.getElementById('view-panel-bg');
        const vCardBg = document.getElementById('view-card-bg');
        const vBanner = document.getElementById('view-banner');
        const vAvatar = document.getElementById('view-avatar');
        const vName = document.getElementById('view-name');
        const vBio = document.getElementById('view-bio');
        
        const linksContainer = document.getElementById('links-container');
        const pLinksContainer = document.getElementById('preview-links-container');

        let linkData = [
            { text: '按鈕一', url: 'https://google.com', isMain: false },
            { text: '按鈕二', url: 'https://google.com', isMain: true }
        ];

        let draggedIndex = null;
        let saveTimeout = null;

        function getContrastColor(hexColor) {
            if (!hexColor || hexColor.charAt(0) !== '#') return '#524641';
            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? '#524641' : '#FFFFFF';
        }

        // 💾 儲存 LocalStorage（加入了 socialColor 和 iconColor 欄位）
        function saveToLocalStorage() {
            const statusEl = document.getElementById('save-status');
            statusEl.innerText = '💾 儲存中...';
            statusEl.style.backgroundColor = '#FFF9C4';
            statusEl.style.color = '#F57F17';

            if (saveTimeout) clearTimeout(saveTimeout);
            
            saveTimeout = setTimeout(() => {
                const dataToSave = {
                    bgColor: inBgColor.value,
                    cardColor: inCardColor.value,
                    mainColor: inMainColor.value,
                    normalBtnColor: inNormalBtnColor.value,
                    bannerColor: inBannerColor.value,
                    socialColor: inSocialColor.value, // ✨ 快取存入
                    iconColor: inIconColor.value,     // ✨ 快取存入
                    name: inName.value,
                    bio: inBio.value,
                    social: {
                        ig: inSocialIg.value,
                        fb: inSocialFb.value,
                        line: inSocialLine.value,
                        email: inSocialEmail.value,
                        yt: inSocialYt.value,
                        threads: inSocialThreads.value,
                        github: inSocialGithub.value
                    },
                    linkData: linkData,
                    base64Banner: base64Banner,
                    base64Avatar: base64Avatar,
                    bannerFileName: bannerFileName,
                    avatarFileName: avatarFileName
                };
                localStorage.setItem('clayhouse_generator_data', JSON.stringify(dataToSave));
                
                statusEl.innerText = '✓ 已自動存檔';
                statusEl.style.backgroundColor = '#E8F5E9';
                statusEl.style.color = '#5C8374';
            }, 500); 
        }

        // 📂 讀取 LocalStorage 快取
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('clayhouse_generator_data');
            if (!saved) return false;
            try {
                const data = JSON.parse(saved);
                inBgColor.value = data.bgColor || '#F7F4F0';
                inCardColor.value = data.cardColor || '#FFFFFF';
                inMainColor.value = data.mainColor || '#E2B27A';
                inNormalBtnColor.value = data.normalBtnColor || '#FFFFFF';
                inBannerColor.value = data.bannerColor || '#F3E8D2';
                inSocialColor.value = data.socialColor || '#E2B27A'; // ✨ 快取還原
                inIconColor.value = data.iconColor || '#E2B27A';     // ✨ 快取還原
                inName.value = data.name !== undefined ? data.name : '我的品牌';
                inBio.value = data.bio !== undefined ? data.bio : '介紹你自己';
                
                if (data.social) {
                    inSocialIg.value = data.social.ig || '';
                    inSocialFb.value = data.social.fb || '';
                    inSocialLine.value = data.social.line || '';
                    inSocialEmail.value = data.social.email || '';
                    inSocialYt.value = data.social.yt || '';
                    inSocialThreads.value = data.social.threads || '';
                    inSocialGithub.value = data.social.github || '';
                }

                linkData = data.linkData || [];
                base64Banner = data.base64Banner || null;
                base64Avatar = data.base64Avatar || null;
                bannerFileName = data.bannerFileName || '';
                avatarFileName = data.avatarFileName || '';

                if (base64Banner && bannerFileName) labelBanner.innerText = `✅ ${bannerFileName}`;
                if (base64Avatar && avatarFileName) labelAvatar.innerText = `✅ ${avatarFileName}`;
                
                return true;
            } catch (e) {
                console.error("讀取歷史快取發生錯誤:", e);
                return false;
            }
        }

        function resetAllData() {
            if (confirm('確定要清空所有已輸入的資料與圖片嗎？此動作無法復原！')) {
                localStorage.removeItem('clayhouse_generator_data');
                window.location.reload();
            }
        }

        function syncEverything() {
            vPanelBg.style.backgroundColor = inBgColor.value;
            vCardBg.style.backgroundColor = inCardColor.value;
            vName.innerText = inName.value || '請輸入品牌名稱';
            vBio.innerText = inBio.value || '';

            // ✨ 左側編輯區的社群小 icon 顏色：同步改用設定的 socialColor 顯示
            ['icon-ig-preview', 'icon-fb-preview', 'icon-line-preview', 'icon-mail-preview', 'icon-yt-preview', 'icon-threads-preview', 'icon-git-preview'].forEach(id => {
                document.getElementById(id).style.color = inSocialColor.value;
            });

            // 右側預覽 Banner 顏色判斷
            if (base64Banner) {
                vBanner.style.backgroundImage = `url(${base64Banner})`;
                vBanner.style.backgroundColor = 'transparent';
            } else {
                vBanner.style.backgroundImage = 'none';
                vBanner.style.backgroundColor = inBannerColor.value;
            }

            if (base64Avatar) {
                vAvatar.style.backgroundImage = `url(${base64Avatar})`;
                vAvatar.style.backgroundColor = 'transparent';
            } else {
                vAvatar.style.backgroundImage = 'none';
                vAvatar.style.backgroundColor = '#EFEAE4';
            }

            // 同步社群圖示列 (右側預覽)
            const socialContainer = document.getElementById('view-social-container');
            socialContainer.innerHTML = '';
            const socialPlatforms = [
                { value: inSocialIg.value, icon: 'fa-brands fa-instagram', title: 'Instagram' },
                { value: inSocialFb.value, icon: 'fa-brands fa-square-facebook', title: 'Facebook' },
                { value: inSocialLine.value, icon: 'fa-brands fa-line', title: 'LINE' },
                { value: inSocialEmail.value, icon: 'fa-solid fa-envelope', title: 'Email' },
                { value: inSocialYt.value, icon: 'fa-brands fa-youtube', title: 'YouTube' },
                { value: inSocialThreads.value, icon: 'fa-brands fa-threads', title: 'Threads' },
                { value: inSocialGithub.value, icon: 'fa-brands fa-github', title: 'GitHub' }
            ];
            socialPlatforms.forEach(platform => {
                if (platform.value && platform.value.trim() !== '') {
                    const a = document.createElement('a');
                    a.href = platform.value.trim();
                    a.target = '_blank';
                    a.className = 'preview-social-icon-link';
                    a.title = platform.title;
                    a.style.color = inSocialColor.value; // ✨ 右側社群套用自訂顏色
                    a.innerHTML = `<i class="${platform.icon}"></i>`;
                    socialContainer.appendChild(a);
                }
            });

            // 同步右側預覽按鈕
            pLinksContainer.innerHTML = '';
            linkData.forEach((link) => {
                const isImageLink = link.type === 'image';
                if (isImageLink) {
                    const pLink = document.createElement('a');
                    pLink.className = 'preview-image-link';
                    pLink.href = link.url || '#';
                    pLink.target = '_blank';
                    if (link.imgBase64) {
                        pLink.style.backgroundImage = `url(${link.imgBase64})`;
                    } else {
                        pLink.classList.add('no-img');
                    }
                    const pText = document.createElement('div');
                    pText.className = 'preview-image-link-text';
                    pText.innerText = link.text || '未命名圖片連結';
                    pLink.appendChild(pText);
                    pLinksContainer.appendChild(pLink);
                } else {
                    const pLink = document.createElement('a');
                    pLink.className = 'preview-link';
                    pLink.href = link.url || '#';
                    pLink.target = '_blank';
                    
                    const pContent = document.createElement('div');
                    pContent.className = 'preview-link-content';
                    
                    if (link.icon) {
                        const pIconCircle = document.createElement('div');
                        pIconCircle.className = 'preview-icon-circle';
                        pIconCircle.innerHTML = `<i class="${link.icon}"></i>`;
                        pContent.appendChild(pIconCircle);
                        
                        if (link.isMain) {
                            // 強調按鈕：Icon 圓圈背景採用自動反白計算顏色，維持高對比清晰度
                            pIconCircle.style.backgroundColor = '#FFFFFF';
                            pIconCircle.style.color = inMainColor.value;
                        } else {
                            // 一般按鈕：圓圈背景採用我們「自訂的 Icon 顏色」！
                            pIconCircle.style.backgroundColor = inIconColor.value; // ✨
                            pIconCircle.style.color = '#FFFFFF';
                        }
                    }
                    
                    const pSpan = document.createElement('span');
                    pSpan.innerText = link.text || '未命名按鈕';
                    pContent.appendChild(pSpan);
                    pLink.appendChild(pContent);

                    const pArrow = document.createElement('div');
                    pArrow.className = 'preview-arrow';
                    pArrow.innerText = '↗';
                    pLink.appendChild(pArrow);
                    
                    if (link.isMain) {
                        const mainBg = inMainColor.value;
                        pLink.style.backgroundColor = mainBg;
                        pLink.style.color = getContrastColor(mainBg);
                        pLink.style.border = 'none';
                        pArrow.style.color = getContrastColor(mainBg);
                    } else {
                        const normalBg = inNormalBtnColor.value;
                        pLink.style.backgroundColor = normalBg;
                        pLink.style.color = getContrastColor(normalBg);
                        pLink.style.border = (normalBg.toLowerCase() === '#ffffff') ? '1px solid #EFEAE4' : 'none';
                        pArrow.style.color = '#888888';
                    }
                    pLinksContainer.appendChild(pLink);
                }
            });

            saveToLocalStorage();
        }

        function renderLeftControls() {
            linksContainer.innerHTML = '';

            linkData.forEach((link, index) => {
                const group = document.createElement('div');
                group.className = 'link-input-group';
                group.setAttribute('data-index', index);

                const isImage = link.type === 'image';

                if (isImage) {
                    group.innerHTML = `
                        <div style="float: right; display: flex; align-items: center; gap: 8px;">
                            <span class="drag-handle" style="font-size:16px; color:#aaa; cursor:grab; user-select:none;">☰</span>
                            <button class="btn-delete" onclick="deleteLinkField(${index})">🗑️</button>
                        </div>
                        <label>🖼️ 圖片連結 ${index + 1} 圖片</label>
                        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                            <label for="upload-link-img-${index}" class="file-upload-btn" style="flex: 1; text-align: center; margin: 0; padding: 8px;">
                                ${link.imgFileName ? `✅ ${link.imgFileName}` : '📁 上傳圖片...'}
                            </label>
                            <input type="file" id="upload-link-img-${index}" accept="image/*" style="display:none;" onchange="handleLinkImageUpload(${index}, this)">
                            ${link.imgBase64 ? `<img src="${link.imgBase64}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 8px; border: 1px solid #EFEAE4;" />` : ''}
                        </div>
                        <label>🔗 圖片連結 ${index + 1} 標題</label>
                        <input type="text" value="${link.text || ''}" placeholder="請輸入圖片底部顯示的標題" oninput="updateLinkData(${index}, 'text', this.value)">
                        <label>圖片連結 ${index + 1} 網址</label>
                        <input type="text" value="${link.url || ''}" placeholder="https://" oninput="updateLinkData(${index}, 'url', this.value)">
                    `;
                } else {
                    const presets = [
                        { value: 'fa-solid fa-cart-shopping', label: '🛒 購物車' },
                        { value: 'fa-solid fa-book', label: '📖 書籍 / 部落格' },
                        { value: 'fa-solid fa-handshake', label: '💼 合作 / 握手' },
                        { value: 'fa-solid fa-palette', label: '🎨 創作 / 調色盤' },
                        { value: 'fa-solid fa-envelope', label: '✉️ 信箱' },
                        { value: 'fa-solid fa-link', label: '🔗 一般連結' }
                    ];
                    const isPreset = !link.icon || presets.some(p => p.value === link.icon);
                    const selectedValue = link.icon ? (isPreset ? link.icon : 'custom') : '';
                    
                    group.innerHTML = `
                        <div style="float: right; display: flex; align-items: center; gap: 8px;">
                            <label style="display:inline-flex; align-items:center; cursor:pointer; font-size:12px; margin:0;">
                                <input type="radio" name="main-button-choice" ${link.isMain ? 'checked' : ''} onclick="setMainButton(${index})" style="margin-right:3px;"> ⭐ 強調色
                            </label>
                            <span class="drag-handle" style="font-size:16px; color:#aaa; cursor:grab; user-select:none; margin-left:5px;">☰</span>
                            <button class="btn-delete" onclick="deleteLinkField(${index})">🗑️</button>
                        </div>
                        <label>🔗 按鈕 ${index + 1} 名稱</label>
                        <input type="text" value="${link.text || ''}" oninput="updateLinkData(${index}, 'text', this.value)">
                        <label>按鈕 ${index + 1} 網址</label>
                        <input type="text" value="${link.url || ''}" oninput="updateLinkData(${index}, 'url', this.value)">
                        
                        <label>按鈕圖示</label>
                        <select id="icon-select-${index}" onchange="handleIconSelectChange(${index}, this.value)" style="margin-bottom: 8px; padding: 8px; border-radius: 8px; border: 1px solid #EFEAE4; width: 100%;">
                            <option value="" ${selectedValue === '' ? 'selected' : ''}>🚫 無圖示</option>
                            <option value="fa-solid fa-cart-shopping" ${selectedValue === 'fa-solid fa-cart-shopping' ? 'selected' : ''}>🛒 購物車</option>
                            <option value="fa-solid fa-book" ${selectedValue === 'fa-solid fa-book' ? 'selected' : ''}>📖 書籍 / 部落格</option>
                            <option value="fa-solid fa-handshake" ${selectedValue === 'fa-solid fa-handshake' ? 'selected' : ''}>💼 合作 / 握手</option>
                            <option value="fa-solid fa-palette" ${selectedValue === 'fa-solid fa-palette' ? 'selected' : ''}>🎨 創作 / 調色盤</option>
                            <option value="fa-solid fa-envelope" ${selectedValue === 'fa-solid fa-envelope' ? 'selected' : ''}>✉️ 信箱</option>
                            <option value="fa-solid fa-link" ${selectedValue === 'fa-solid fa-link' ? 'selected' : ''}>🔗 一般連結</option>
                            <option value="custom" ${selectedValue === 'custom' ? 'selected' : ''}>❓ 自訂 Font Awesome Class</option>
                        </select>
                        <div id="custom-icon-wrapper-${index}" style="display: ${selectedValue === 'custom' ? 'block' : 'none'}; margin-bottom: 8px;">
                            <label>自訂圖示 Class (例如: fa-brands fa-github)</label>
                            <input type="text" value="${selectedValue === 'custom' ? (link.icon || '') : ''}" placeholder="fa-brands fa-github" oninput="updateLinkData(${index}, 'icon', this.value)">
                        </div>
                    `;
                }

                const dragHandle = group.querySelector('.drag-handle');
                if (dragHandle) {
                    dragHandle.addEventListener('mousedown', () => { group.setAttribute('draggable', 'true'); });
                    dragHandle.addEventListener('mouseup', () => { group.removeAttribute('draggable'); });
                }

                group.addEventListener('dragstart', (e) => { draggedIndex = index; group.style.opacity = '0.5'; });
                group.addEventListener('dragend', () => { 
                    group.style.opacity = '1'; 
                    draggedIndex = null; 
                    group.removeAttribute('draggable');
                    saveToLocalStorage();
                });
                group.addEventListener('dragover', (e) => e.preventDefault());
                group.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const targetIndex = parseInt(group.getAttribute('data-index'));
                    if (draggedIndex !== null && draggedIndex !== targetIndex) {
                        const movedItem = linkData.splice(draggedIndex, 1)[0];
                        linkData.splice(targetIndex, 0, movedItem);
                        renderLeftControls();
                    }
                });

                linksContainer.appendChild(group);
            });

            syncEverything();
        }

        function updateLinkData(index, field, value) {
            if (linkData[index]) {
                linkData[index][field] = value;
                syncEverything(); 
            }
        }

        function handleIconSelectChange(index, value) {
            const customWrapper = document.getElementById(`custom-icon-wrapper-${index}`);
            if (value === 'custom') {
                customWrapper.style.display = 'block';
                linkData[index].icon = '';
            } else {
                customWrapper.style.display = 'none';
                linkData[index].icon = value;
            }
            syncEverything();
        }

        function setMainButton(selectedIndex) {
            linkData.forEach((link, index) => { link.isMain = (index === selectedIndex); });
            renderLeftControls();
            saveToLocalStorage();
        }

        function handleLinkImageUpload(index, input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    linkData[index].imgBase64 = event.target.result;
                    linkData[index].imgFileName = file.name;
                    syncEverything();
                    renderLeftControls();
                };
                reader.readAsDataURL(file);
            }
        }

        function addLinkField(type = 'button') {
            if (type === 'image') {
                linkData.push({ type: 'image', text: '新圖片連結', url: 'https://', imgBase64: null, imgFileName: '' });
            } else {
                linkData.push({ type: 'button', text: '新按鈕', url: 'https://', isMain: false });
            }
            renderLeftControls();
            saveToLocalStorage();
        }

        function deleteLinkField(index) {
            linkData.splice(index, 1);
            renderLeftControls();
            saveToLocalStorage();
        }

        uploadBanner.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                bannerFileName = file.name;
                labelBanner.innerText = `✅ ${bannerFileName}`;
                const reader = new FileReader();
                reader.onload = function(event) {
                    base64Banner = event.target.result;
                    syncEverything();
                };
                reader.readAsDataURL(file);
            }
        });

        uploadAvatar.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                avatarFileName = file.name;
                labelAvatar.innerText = `✅ ${avatarFileName}`;
                const reader = new FileReader();
                reader.onload = function(event) {
                    base64Avatar = event.target.result;
                    syncEverything();
                };
                reader.readAsDataURL(file);
            }
        });

        function clearImage(type) {
            if (type === 'banner') {
                base64Banner = null; bannerFileName = '';
                uploadBanner.value = ''; labelBanner.innerText = '📁 點擊選取本機圖片...';
            } else {
                base64Avatar = null; avatarFileName = '';
                uploadAvatar.value = ''; labelAvatar.innerText = '📁 點擊選取本機圖片...';
            }
            syncEverything();
        }

        // 把新的自訂顏色欄位也加入監聽
        [inBgColor, inCardColor, inMainColor, inNormalBtnColor, inBannerColor, inSocialColor, inIconColor, inName, inBio,
         inSocialIg, inSocialFb, inSocialLine, inSocialEmail, inSocialYt, inSocialThreads, inSocialGithub].forEach(input => {
            input.addEventListener('input', syncEverything);
        });

        function base64ToBlob(base64Str, mimeType) {
            if (!base64Str || !base64Str.startsWith('data:')) return null;
            const byteString = atob(base64Str.split(',')[1]);
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) { ia[i] = byteString.charCodeAt(i); }
            return new Blob([ab], { type: mimeType });
        }

        // 📥 打包下載功能
        function downloadHTML() {
            const template = document.getElementById('code-template').value;
            const zip = new JSZip();
            const imgFolder = zip.folder("images");
            
            let socialHtml = '';
            const socialPlatforms = [
                { value: inSocialIg.value, icon: 'fa-brands fa-instagram', title: 'Instagram' },
                { value: inSocialFb.value, icon: 'fa-brands fa-square-facebook', title: 'Facebook' },
                { value: inSocialLine.value, icon: 'fa-brands fa-line', title: 'LINE' },
                { value: inSocialEmail.value, icon: 'fa-solid fa-envelope', title: 'Email' },
                { value: inSocialYt.value, icon: 'fa-brands fa-youtube', title: 'YouTube' },
                { value: inSocialThreads.value, icon: 'fa-brands fa-threads', title: 'Threads' },
                { value: inSocialGithub.value, icon: 'fa-brands fa-github', title: 'GitHub' }
            ];
            let activePlatforms = socialPlatforms.filter(p => p.value && p.value.trim() !== '');
            if (activePlatforms.length > 0) {
                socialHtml += '        <div class="social-icons-wrapper">\n';
                activePlatforms.forEach(p => {
                    socialHtml += `            <a href="${p.value.trim()}" target="_blank" class="social-icon-link" title="${p.title}"><i class="${p.icon}"></i></a>\n`;
                });
                socialHtml += '        </div>\n';
            }

            let linksHtml = '';
            linkData.forEach((link, index) => {
                if (link.type === 'image') {
                    if (link.imgBase64) {
                        const mimeMatch = link.imgBase64.match(/^data:([^;]+);base64,/);
                        const mimeType = mimeMatch ? mimeMatch[1] : 'image/png';
                        const blob = base64ToBlob(link.imgBase64, mimeType);
                        const fileName = `link_image_${index}.png`;
                        imgFolder.file(fileName, blob);
                        
                        linksHtml += `            <a class="image-link" href="${link.url || '#'}" target="_blank" style="background-image: url('images/${fileName}')"><div class="image-link-text">${link.text || '未命名圖片連結'}</div></a>\n`;
                    } else {
                        linksHtml += `            <a class="image-link no-img" href="${link.url || '#'}" target="_blank"><div class="image-link-text">${link.text || '未命名圖片連結'}</div></a>\n`;
                    }
                } else {
                    if (link.isMain) {
                        const mainBg = inMainColor.value;
                        const mainText = getContrastColor(mainBg);
                        linksHtml += `            <a class="link" href="${link.url || '#'}" target="_blank" style="background-color: ${mainBg}; color: ${mainText}; border: none;">
                <div class="link-content">
                    ${link.icon ? `<div class="icon-circle" style="background-color: ${mainText}; color: ${mainBg};"><i class="${link.icon}"></i></div>` : ''}
                    <span>${link.text || '未命名按鈕'}</span>
                </div>
                <div class="arrow-icon" style="color: ${mainText};">↗</div>
            </a>\n`;
                    } else {
                        const normalBg = inNormalBtnColor.value;
                        const normalText = getContrastColor(normalBg);
                        const normalBorder = (normalBg.toLowerCase() === '#ffffff') ? '1px solid #EFEAE4' : 'none';
                        linksHtml += `            <a class="link" href="${link.url || '#'}" target="_blank" style="background-color: ${normalBg}; color: ${normalText}; border: ${normalBorder};">
                <div class="link-content">
                    ${link.icon ? `<div class="icon-circle" style="background-color: ${inIconColor.value}; color: #ffffff;"><i class="${link.icon}"></i></div>` : ''}
                    <span>${link.text || '未命名按鈕'}</span>
                </div>
                <div class="arrow-icon">↗</div>
            </a>\n`;
                    }
                }
            });

            const bannerStyle = base64Banner ? 'style="background-image: url(\'images/banner.png\')"' : '';
            const avatarStyle = base64Avatar ? 'style="background-image: url(\'images/avatar.png\')"' : '';

            let finalCode = template
                .replace('{{BG_COLOR}}', inBgColor.value)
                .replace('{{CARD_COLOR}}', inCardColor.value)
                .replace('{{BANNER_COLOR}}', inBannerColor.value)
                .replace('{{SOCIAL_COLOR}}', inSocialColor.value) // ✨ 替換導出網頁的社群圖示主色
                .replace('{{ICON_COLOR}}', inIconColor.value)     // ✨ 替換導出網頁的按鈕圓圈圖示顏色
                .replace('{{AVATAR_FALLBACK}}', '#EFEAE4')
                .replace('{{BANNER_STYLE}}', bannerStyle)
                .replace('{{AVATAR_STYLE}}', avatarStyle)
                .replace('{{NAME}}', inName.value || '我的品牌')
                .replace('{{NAME}}', inName.value || '我的品牌')
                .replace('{{BIO}}', inBio.value || '')
                .replace(/\{\{MAIN_COLOR\}\}/g, inMainColor.value)
                .replace('{{SOCIAL_HTML}}', socialHtml)
                .replace('{{LINKS_HTML}}', linksHtml);

            zip.file("index.html", finalCode);
            
            const bannerBlob = base64ToBlob(base64Banner, 'image/png');
            const avatarBlob = base64ToBlob(base64Avatar, 'image/png');
            
            if (bannerBlob) imgFolder.file("banner.png", bannerBlob);
            if (avatarBlob) imgFolder.file("avatar.png", avatarBlob);

            zip.generateAsync({ type: "blob" }).then(function(content) {
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url; a.download = 'my-homepage.zip';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        }

        window.onload = function() {
            loadFromLocalStorage();
            renderLeftControls();
        };
    </script>
</body>
</html>
