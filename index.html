        * {

            margin: 5px 25px 25px;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .social-icons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin: -10px auto 20px;
            flex-wrap: wrap;

            font-size: 22px;
            color: #E2B27A;
            transition: transform 0.2s ease;
            display: inline-block;
        }

        .social-icon-link:hover {
            transform: scale(1.2);
        }

        .links-wrapper {
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background-color: #FFFFFF;
            color: #524641;
            text-decoration: none;
            border-radius: 16px;
            font-weight: bold;
            border: 1px solid #EFEAE4;
            box-shadow: 0 4px 10px rgba(82, 70, 65, 0.02);
            transition: all 0.2s ease;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(82, 70, 66, 0.06);
        }

        .link-card.primary {
            background-color: #E2B27A;
            color: #FFFFFF;
            border: none;
        }

        .link-card.primary .icon-circle {
            background-color: #FFFFFF;
            color: #E2B27A;
        }

        .link-card.primary .arrow-icon {
            color: #FFFFFF;
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-circle {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background-color: #E2B27A;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;

        .arrow-icon {
